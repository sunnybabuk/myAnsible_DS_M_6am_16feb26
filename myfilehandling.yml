---
  - hosts: 172.31.41.253
    become: yes
    tasks:
    - include_tasks: myfile.yml
    - name: i want to create a folder
      file:
        path: /home/sunny/myfolder
        state: directory
    - name: copy file from master to node
      copy:
        src: mystaticfile
        dest: /home/sunny/myfolder
    - name: download remote files (internet)
      get_url:
        url: https://github.com/sunnybabuk/myAnsible_DS_M_6am_16feb26/blob/main/README.md
        dest: /home/sunny/myfolder/README.md
        force_basic_auth: yes
    - name: copy index.j2 file into node side
      template:
        src: myindex.j2
        dest: /var/www/html/index.html
    - name: download remote files (internet)
    - name: install apache2
      apt:
        name: apache2
        state: present 
